<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Web Alumni UNIKU</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 20px;
      color: #4CAF50;
    }

    /* Styling for the hover profile box */
    #hoverProfile {
      width: 150px;
      height: 150px;
      background-color: lightgray;
      margin: 20px 0;
      text-align: center;
      line-height: 150px;
      transition: background-color 0.3s, transform 0.3s, box-shadow 0.3s;
      border: 1px solid #ccc;
      overflow: hidden;
    }

    /* Profile image inside hoverProfile box */
    #hoverProfile img {
      max-width: 100%;
      height: auto;
      transition: transform 0.3s, filter 0.3s;
    }

    /* Hover effects for the profile box */
    #hoverProfile:hover {
      background-color: #e0e0e0;
      transform: scale(1.1);
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
    }

    /* Styling for output messages */
    #output {
      margin-top: 20px;
      color: green;
    }

    /* Styling for window size display */
    #windowSize {
      margin-top: 20px;
      color: blue;
    }

    /* Form styling */
    form {
      margin-top: 20px;
    }

    label {
      display: block;
      margin-bottom: 5px;
    }

    /* Styling for form inputs */
    input[type="text"],
    input[type="file"] {
      width: 100%;
      padding: 8px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    /* Button styling */
    button {
      padding: 10px 15px;
      background-color: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    /* Hover effect for buttons */
    button:hover {
      background-color: #45a049;
    }

    /* Table styling */
    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    table,
    th,
    td {
      border: 1px solid #ddd;
    }

    th,
    td {
      padding: 10px;
      text-align: left;
    }

    th {
      background-color: #f2f2f2;
    }

    /* Styling for images in the table */
    td img {
      width: 100px;
      height: auto;
      transition: all 0.3s ease-in-out;
    }

    /* Styling for action buttons */
    .action-buttons button {
      margin: 0 5px;
      padding: 5px 10px;
      color: white;
      cursor: pointer;
      border-radius: 4px;
    }

    .action-buttons button.delete {
      background-color: #f44336;
    }

    .action-buttons button:hover {
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <h1>Web Alumni UNIKU</h1>

  <!-- Button to contact alumni -->
  <button id="contactButton">Hubungi Alumni</button>

  <!-- Profile image with hover effect -->
  <div id="hoverProfile">
    <img src="alumni1.jpg" alt="Profil Alumni 1">
  </div>

  <!-- Search alumni input field -->
  <input type="text" id="searchAlumni" placeholder="Cari alumni...">

  <!-- Form to add alumni data -->
  <form id="alumniForm">
    <label for="name">Nama Alumni:</label>
    <input type="text" id="name" name="name" placeholder="Masukkan nama alumni">

    <label for="year">Tahun Kelulusan:</label>
    <input type="text" id="year" name="year" placeholder="Masukkan tahun kelulusan">

    <label for="photo">Photo Alumni:</label>
    <input type="file" id="photo" name="photo" accept="image/*">

    <button type="submit">Tambahkan Alumni</button>
  </form>

  <!-- Table displaying alumni data -->
  <table id="alumniTable">
    <thead>
      <tr>
        <th>Nama Alumni</th>
        <th>Tahun Kelulusan</th>
        <th>Photo</th>
        <th>Aksi</th>
      </tr>
    </thead>
    <tbody>
      <!-- Data alumni will be added here dynamically -->
    </tbody>
  </table>

  <!-- Window size display -->
  <p id="windowSize">Ukuran jendela: </p>

  <!-- Output for custom events -->
  <p id="output"></p>

  <!-- Include jQuery -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <!-- Include external JavaScript file -->
  <script src="script_03.js"></script>

</body>

</html>
